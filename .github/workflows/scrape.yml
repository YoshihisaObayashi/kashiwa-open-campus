name: Daily Scrape & DB Update

on:
  schedule:
    # 毎日 JST 07:00 (UTC 22:00) に実行
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'スクレイプ対象URL（省略時は環境変数のデフォルト値）'
        required: false
        type: string

jobs:
  scrape:
    name: Scrape & Translate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DB_PATH: ${{ github.workspace }}/events.db
      TARGET_URL: ${{ inputs.target_url || vars.TARGET_URL || 'https://www.kashiwa.u-tokyo.ac.jp/open_campus_2025/' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # DBファイルをRender.comからダウンロード（永続化のため）
      # ローカル開発時はスキップ
      - name: Download existing DB from storage
        if: ${{ env.RENDER_DB_DOWNLOAD_URL != '' }}
        env:
          RENDER_DB_DOWNLOAD_URL: ${{ secrets.RENDER_DB_DOWNLOAD_URL }}
        run: |
          curl -o events.db "$RENDER_DB_DOWNLOAD_URL" || echo "DB download failed, starting fresh"

      - name: Run scraper
        run: python scraper/scrape.py
        id: scrape

      - name: Show scrape log
        run: python -c "
import sqlite3, json
conn = sqlite3.connect('events.db')
logs = conn.execute('SELECT * FROM scrape_log ORDER BY id DESC LIMIT 5').fetchall()
for log in logs:
    print(dict(zip([d[0] for d in conn.execute(\"PRAGMA table_info(scrape_log)\").fetchall()], log)))
conn.close()
"

      # Render.com の外部DBにアップロード（設定している場合）
      - name: Upload updated DB to backend
        if: ${{ env.RENDER_ADMIN_URL != '' }}
        env:
          RENDER_ADMIN_URL: ${{ secrets.RENDER_ADMIN_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          curl -X POST "$RENDER_ADMIN_URL/api/admin/db-sync" \
            -H "X-API-Key: $ADMIN_API_KEY" \
            -F "db=@events.db" \
            --fail-with-body || echo "DB sync skipped"

      # 統計情報をサマリーとして記録
      - name: Report summary
        if: always()
        run: python -c "
import sqlite3, os
try:
    conn = sqlite3.connect('events.db')
    total = conn.execute('SELECT COUNT(*) FROM events').fetchone()[0]
    last = conn.execute('SELECT run_at, new_count, updated_count, error_count FROM scrape_log ORDER BY id DESC LIMIT 1').fetchone()
    conn.close()
    print(f'## Scrape Summary')
    print(f'- Total events in DB: {total}')
    if last:
        print(f'- Run at: {last[0]}')
        print(f'- New: {last[1]}, Updated: {last[2]}, Errors: {last[3]}')
except Exception as e:
    print(f'Could not read summary: {e}')
" >> $GITHUB_STEP_SUMMARY

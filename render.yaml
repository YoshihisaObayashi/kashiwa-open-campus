# =============================================================
# Render.com デプロイ設定（無料プラン対応版）
# render.yaml
# =============================================================
# 使い方:
#   1. Render.com ダッシュボードで "New > Blueprint" を選択
#   2. このリポジトリを接続
#   3. 以下の環境変数を Environment タブで手動設定:
#      - ADMIN_API_KEY  : 管理者APIキー (openssl rand -hex 32 で生成)
#      - GEMINI_API_KEY : Gemini API キー
#
# ⚠️ 無料プランの制約:
#   - 永続ディスク非対応 → SQLiteは /tmp に保存（再起動で消える）
#   - GitHub Actions が毎日 DB を再同期するため実用上は問題なし
#   - 15分間アクセスがないとスリープ（初回アクセスに30秒かかる）
# =============================================================

services:
  # ---- バックエンド API (FastAPI) ----
  - type: web
    name: kashiwa-open-campus-api
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt --prefer-binary
    startCommand: bash -c "cd /opt/render/project/src/backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"       # 3.14 はpydantic-coreのwheelなし → 3.11で固定
      - key: DB_PATH
        value: /tmp/events.db
      - key: ADMIN_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app,http://localhost:5173
      - key: PYTHONPATH
        value: /opt/render/project/src/backend
